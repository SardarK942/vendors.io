name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel previous runs on the same ref so a fast follow-up commit doesn't sit
# behind a stale run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    name: typecheck · lint · unit · build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

      - name: Build (with placeholder env vars)
        # next build needs env vars present at build time even for static checks.
        # These placeholders only need to be syntactically valid; runtime calls
        # never fire during build.
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_placeholder
          SUPABASE_SERVICE_ROLE_KEY: sb_secret_placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          OPENAI_API_KEY: sk-placeholder
          RESEND_API_KEY: re_placeholder
          UPLOADTHING_TOKEN: placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  e2e:
    name: e2e (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: fast
    steps:
      - uses: actions/checkout@v4

      # Secrets can't be referenced in job-level `if:`. Probe them in a step
      # and gate every following step on the result. Skip cleanly (with a
      # warning) when secrets aren't configured yet.
      - name: Check for E2E secrets
        id: check
        env:
          PROBE: ${{ secrets.E2E_SUPABASE_URL }}
        run: |
          if [ -n "$PROBE" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::E2E secrets not set — skipping E2E. Add them at https://github.com/${{ github.repository }}/settings/secrets/actions"
          fi

      - if: steps.check.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - if: steps.check.outputs.configured == 'true'
        run: npm ci

      - name: Install Playwright browser
        if: steps.check.outputs.configured == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        if: steps.check.outputs.configured == 'true'
        run: npm run test:e2e
        env:
          # Read from GitHub repo secrets — set these once at:
          # https://github.com/SardarK942/vendors.io/settings/secrets/actions
          # All point at the DEV Supabase project + test-mode Stripe.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.E2E_STRIPE_PUBLISHABLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.E2E_STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          OPENAI_API_KEY: ${{ secrets.E2E_OPENAI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.E2E_RESEND_API_KEY }}
          UPLOADTHING_TOKEN: placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Upload Playwright report on failure
        if: failure() && steps.check.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
